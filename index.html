
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>radio</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='black'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold' font-size='9'%3Eradio%3C/text%3E%3C/svg%3E">
    
    <!-- ROCK SOLID DEPENDENCIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        :root {
            --apple-bg: rgba(28, 28, 30, 0.75);
            --apple-border: rgba(255, 255, 255, 0.1);
            --apple-blue: #0a84ff;
            --apple-text: #ffffff;
            --apple-text-muted: #8e8e93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background-color: #000;
            color: var(--apple-text);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #globeCanvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }

        .sidebar {
            position: absolute; top: 0; left: 0; width: 340px; height: calc(100vh - 100px);
            background: var(--apple-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--apple-border); pointer-events: auto; display: flex;
            flex-direction: column; box-shadow: 5px 0 30px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1); z-index: 100;
        }
        .sidebar.collapsed { transform: translateX(-100%); }

        .sidebar-toggle {
            position: absolute; top: 20px; left: 360px; width: 44px; height: 44px;
            background: var(--apple-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--apple-border); border-radius: 12px; color: white;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            pointer-events: auto; transition: all 0.3s; z-index: 101;
        }
        .sidebar.collapsed + .sidebar-toggle { left: 20px; }
        .sidebar-toggle:hover { background: rgba(255,255,255,0.1); }

        .sidebar-header { padding: 25px 20px 15px; border-bottom: 1px solid var(--apple-border); }
        .logo { font-size: 24px; font-weight: 700; letter-spacing: -1px; margin-bottom: 15px; display: flex; align-items: center; color: var(--apple-blue); }
        .logo span { color: #fff; margin-right: 1px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn {
            flex: 1; padding: 8px 0; background: rgba(255, 255, 255, 0.1); border: 1px solid transparent;
            color: white; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--apple-blue); border-color: var(--apple-blue); }

        .search-box, .filter-box {
            width: 100%; background: rgba(255, 255, 255, 0.1); border: 1px solid transparent;
            color: white; padding: 10px 14px; border-radius: 10px; font-size: 14px; outline: none; transition: all 0.2s; margin-bottom: 8px;
        }
        .search-box:focus, .filter-box:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--apple-blue); }
        .filter-box option { background: #1c1c1e; color: #fff; }

        .station-list { flex: 1; overflow-y: auto; padding: 10px; overscroll-behavior: contain; }
        .station-list::-webkit-scrollbar { width: 6px; }
        .station-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .station-item { padding: 12px 14px; border-radius: 10px; cursor: pointer; transition: background 0.2s; margin-bottom: 4px; display: flex; align-items: center; gap: 12px;}
        .station-item:hover { background: rgba(255, 255, 255, 0.1); }
        .station-item.active { background: rgba(10, 132, 255, 0.25); border: 1px solid rgba(10, 132, 255, 0.5); }
        .station-icon { width: 40px; height: 40px; border-radius: 8px; background: #222; flex-shrink: 0; object-fit: cover; }
        .station-details { flex: 1; overflow: hidden; }
        .station-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-geo { font-size: 12px; color: var(--apple-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .station-tags { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-item.active .station-geo, .station-item.active .station-tags { color: rgba(255,255,255,0.8); }

        .player-dock {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100px;
            background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--apple-border); pointer-events: auto; display: flex;
            align-items: center; justify-content: space-between; padding: 0 40px; z-index: 10;
        }

        .now-playing { display: flex; align-items: center; gap: 15px; width: 30%; min-width: 250px; }
        .np-img { width: 60px; height: 60px; border-radius: 12px; background: #111; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .np-info { display: flex; flex-direction: column; overflow: hidden; }
        .np-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .np-sub { font-size: 13px; color: var(--apple-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .controls { display: flex; align-items: center; justify-content: center; flex: 1; gap: 20px; }
        
        .btn-fav {
            background: none; border: none; color: var(--apple-text-muted); padding: 5px;
            cursor: pointer; transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1.5), color 0.2s; outline: none;
            display: flex; align-items: center; justify-content: center;
            will-change: transform; transform: translateZ(0); 
        }
        .btn-fav svg { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 2; vector-effect: non-scaling-stroke; }
        .btn-fav:hover { transform: scale(1.1); color: #fff; }
        .btn-fav.active { color: #ff3366; }
        .btn-fav.active svg { fill: #ff3366; stroke: #ff3366; }

        .btn-next {
            background: none; border: none; color: var(--apple-text-muted); padding: 5px;
            cursor: pointer; transition: transform 0.2s, color 0.2s; outline: none;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-next svg { width: 28px; height: 28px; fill: currentColor; }
        .btn-next:hover { transform: scale(1.1); color: #fff; }
        .btn-next:active { transform: scale(0.9); }

        .btn-play {
            width: 54px; height: 54px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 22px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s;
        }

        #visualizer-container {
            position: absolute; bottom: 100px; left: 0; width: 100%; height: 60px;
            pointer-events: none; display: flex; align-items: flex-end; justify-content: center;
            gap: 3px; padding-bottom: 5px; z-index: 5;
        }
        .vis-bar {
            width: 4px; height: 4px; background: var(--apple-blue); border-radius: 2px;
            transition: height 0.1s ease; opacity: 0.6;
        }
        .btn-play:hover { transform: scale(1.05); }
        .btn-play:active { transform: scale(0.95); }

        .volume-ctrl { width: 30%; display: flex; align-items: center; justify-content: flex-end; gap: 12px; }
        input[type="range"] { -webkit-appearance: none; width: 130px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; cursor: pointer; }

        #tooltip {
            position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 6px 12px;
            border-radius: 8px; font-size: 14px; pointer-events: none; display: none; z-index: 20;
            border: 1px solid var(--apple-border); backdrop-filter: blur(10px); font-weight: 500;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--apple-blue); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #loader-text { margin-top: 25px; font-size: 14px; letter-spacing: 2px; color: var(--apple-text-muted); font-weight: 600; text-transform: uppercase;}

        @media (max-width: 768px) {
            .sidebar { 
                width: 85vw; 
                max-width: 380px; 
                height: calc(100vh - 120px - env(safe-area-inset-bottom)); 
                z-index: 200; 
            }
            .sidebar-toggle { left: 85vw; transform: translateX(-5px); top: 15px; }
            .sidebar.collapsed + .sidebar-toggle { left: 15px; transform: none; }
            
            .player-dock { 
                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                right: 0 !important;
                width: 100% !important;
                height: 120px; 
                padding: 0 15px calc(10px + env(safe-area-inset-bottom)); 
                flex-wrap: wrap; 
                justify-content: space-between; 
                align-items: center;
                z-index: 10000;
            }
            .now-playing { width: auto; min-width: 0; flex: 1; max-width: 60%; }
            .np-img { width: 50px; height: 50px; }
            .np-title { font-size: 14px; }
            .np-sub { font-size: 12px; }
            
            .controls { flex: none; width: auto; gap: 10px; margin-right: 5px;}
            .btn-play { width: 44px; height: 44px; font-size: 18px; }
            
            .volume-ctrl { display: none; }
            #visualizer-container { bottom: 120px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Connecting to satellite network...</div>
    </div>

    <canvas id="globeCanvas"></canvas>

    <div id="ui-layer">
        <!-- Sidebar -->
        <aside class="sidebar collapsed" id="sidebar">
            <div class="sidebar-header">
                <div class="logo"><span>rorothe</span>/radio</div>
                <div class="tabs">
                    <button class="tab-btn active" id="tab-all">All</button>
                    <button class="tab-btn" id="tab-fav">Favorites</button>
                </div>
                <input type="text" class="search-box" id="search-input" placeholder="Search station, country...">
                <select class="filter-box" id="country-filter">
                    <option value="">All Countries</option>
                </select>
                <select class="filter-box" id="genre-filter">
                    <option value="">All Genres</option>
                </select>
            </div>
            <div class="station-list" id="station-list"></div>
        </aside>
        <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

        <!-- Player -->
        <div class="player-dock" id="player-dock">
            <div class="now-playing">
                <img id="player-mini-canvas" class="np-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100%25' height='100%25' fill='%23111'/%3E%3C/svg%3E" alt="Station Logo">
                <div class="np-info">
                    <div class="np-title" id="player-title">Searching signal...</div>
                    <div class="np-sub" id="player-subtitle">Select a station on the map</div>
                </div>
            </div>
            <div class="controls">
                <button class="btn-fav" id="fav-btn" title="Add to favorites">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
                    </svg>
                </button>
                <button class="btn-play" id="play-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="btn-next" id="next-btn" title="Next station">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
            <div class="volume-ctrl">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                <input type="range" id="volume-slider" min="0" max="100" value="80">
            </div>
        </div>
        <div id="visualizer-container"></div>
        <div id="tooltip"></div>
    </div>

    <audio id="audio-player" crossorigin="anonymous"></audio>

<script>
    // Utility functions
    function escapeHtml(text) { 
        if(!text) return ''; 
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function sanitizeUrl(url) {
        if(!url) return '';
        return String(url)
            .replace(/&#038;/g, '&')
            .replace(/&amp;/g, '&')
            .replace(/"/g, '%22')
            .replace(/'/g, '%27');
    }

    let apiBaseUrl = 'https://de1.api.radio-browser.info/json';
    let allStations =[];
    let mappedStations = []; // Stations with coordinates
    let currentFilteredList =[];
    let availableGenres = [];
    let availableCountries =[];

    // Manage favorites state
    let favorites = JSON.parse(localStorage.getItem('radioFavorites')) ||[];
    let currentMode = 'all'; // 'all' oder 'fav'
    let currentStation = null;
    let isMobile = window.innerWidth <= 768;

    const audio = document.getElementById('audio-player');
    audio.volume = 0.8;

    const PLAY_SVG = `<svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M8 5v14l11-7z"/></svg>`;
    const PAUSE_SVG = `<svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

    async function initApp() {
        const cached = localStorage.getItem('radio_cache_rorothe');
        if (cached) {
            try {
                const data = JSON.parse(cached);
                processStationData(data);
                hideLoader(); 
            } catch(e) { localStorage.removeItem('radio_cache_rorothe'); }
        }

        texLoader.load('https://unpkg.com/three-globe/example/img/earth-dark.jpg', 
            (tex) => {
                earthMat.map = tex;
                earthMat.color.setHex(0xffffff);
                earthMat.needsUpdate = true;
            }
        );

        try {
            const sRes = await fetch('https://all.api.radio-browser.info/json/servers');
            const servers = await sRes.json();
            apiBaseUrl = `https://${servers[0].name}/json`;
            
            const res = await fetch(`${apiBaseUrl}/stations/search?limit=5000&order=votes&reverse=true&hidebroken=true`);
            const rawData = await res.json();
            
            // Strip out API bloat to avoid QuotaExceededError
            const slimData = rawData.map(s => ({
                stationuuid: s.stationuuid,
                name: s.name,
                url: s.url,
                url_resolved: s.url_resolved,
                favicon: s.favicon,
                tags: s.tags,
                country: s.country,
                countryCode: s.countrycode || s.countryCode, // support both just in case
                language: s.language,
                geo_lat: s.geo_lat,
                geo_long: s.geo_long
            }));
            
            try {
                localStorage.setItem('radio_cache_rorothe', JSON.stringify(slimData));
            } catch(storageErr) {
                console.warn("Storage quota full, running live from RAM instead.", storageErr);
                localStorage.removeItem('radio_cache_rorothe'); // Clear it if it's broken
            }
            
            if (pointsMesh) {
                scene.remove(pointsMesh);
                pointsMesh.geometry.dispose();
                pointsMesh.material.dispose();
                pointsMesh = null;
            }

            processStationData(slimData);
            hideLoader();
        } catch(e) {
            console.error("Background refresh failed", e);
        }
    }

    function processStationData(data) {
        normalizeTags(data);
        addStationsToGlobe(data);
        extractGenres(data);
        extractCountries(data);
        currentFilteredList = allStations.slice(0, 1000);
        renderSidebarList(currentFilteredList);
    }

    const genreNormalizationMap = {
        'español': 'spanish', 'espana': 'spanish', 'éxitos': 'hits', 'exitos': 'hits',
        'noticias': 'news', 'deportes': 'sports', 'cristiana': 'christian', 
        'cristiano': 'christian', 'religiosa': 'religious', 'variada': 'various', 
        'romantica': 'romantic', 'viejitas': 'oldies', 'viejitos': 'oldies',
        'latina': 'latin', 'latino': 'latin', 'clasica': 'classical', 'clásica': 'classical', 
        'urbano': 'urban', 'infantil': 'children', 'entrevistas': 'talk', 'cultura': 'culture', 
        'educacion': 'education', 'educación': 'education', 'electronica': 'electronic', 
        'electrónica': 'electronic', 'religión': 'religious', 'religion': 'religious',
        'alternativa': 'alternative', 'pública': 'public', 'publica': 'public', 
        'universitaria': 'university', 'comunidad': 'community', 'juvenil': 'youth', 
        'clásicos': 'classics', 'clasicos': 'classics', 'baladas': 'ballads', 
        'recuerdos': 'memories', 'evangélica': 'evangelical', 'evangelica': 'evangelical', 
        'católica': 'catholic', 'catolica': 'catholic', 'entretenimiento': 'entertainment',
        'información': 'info', 'informacion': 'info', 'variedades': 'various',
        'juveniles': 'youth', 'deportiva': 'sports', 'románticas': 'romantic',
        'deutsch': 'german', 'nachrichten': 'news', 'oldies': 'oldies', 'sport': 'sports',
        'français': 'french', 'informations': 'news',
        'notícias': 'news', 'notizie': 'news'
    };
    
    const blacklistedTags = new Set([
        'radio', 'music', 'live', 'stream', 'internet', 'station', 'world', 'top', 
        'fm', 'am', 'web', 'online', 'digital', 'hits', 'various', 'other', 'misc', 
        'unknown', 'música', 'musica', 'public', 'free', 'community', 'estación', 
        'estacion', 'latinoamérica', 'norteamérica', 'moi merino', 'regional', 
        'popular', 'traditional', 'various', 'variety', 'mixed', 'global'
    ]);

    function normalizeTags(data) {
        data.forEach(s => {
            if(s.tags) {
                const stationTags = new Set();
                s.tags.split(',').forEach(tag => {
                    let t = tag.trim().toLowerCase();
                    t = t.replace(/^(música|musica|radio|estación|station|traditional|popular|en)\s+/, '');
                    t = t.replace(/\s+(radio|music|station|fm|am|estación|estacion|fm|digital|web|online|stream)$/, '');
                    t = t.replace(/^(ciudad de|valle de|estado de)\s+/, '');

                    if (t.includes('mexic') || t.includes('méxic') || t === 'mex' || t === 'cdmx') t = 'mexican';
                    else if (t.includes('españ') || t.includes('espan') || t === 'spanish') t = 'spanish';
                    else if (t.includes('noticia') || t === 'news' || t === 'news talk') t = 'news';
                    else if (t.includes('cristian') || t.includes('religious') || t.includes('religio')) t = 'religious';

                    if (genreNormalizationMap[t]) t = genreNormalizationMap[t];
                    if (t.length > 2 && !/^\d+$/.test(t) && !blacklistedTags.has(t)) stationTags.add(t);
                });
                s.normalizedTagsArray = Array.from(stationTags);
            } else {
                s.normalizedTagsArray =[];
            }
        });
    }

    function extractGenres(data) {
        let tagCount = {};
        data.forEach(s => {
            if(s.normalizedTagsArray) {
                s.normalizedTagsArray.forEach(t => {
                    tagCount[t] = (tagCount[t] || 0) + 1;
                });
            }
        });
        
        availableGenres = Object.keys(tagCount).sort((a,b) => tagCount[b] - tagCount[a]).slice(0, 60);
        const filterEl = document.getElementById('genre-filter');
        filterEl.innerHTML = '<option value="">All Genres</option>' + 
            availableGenres.map(g => `<option value="${g}">${g.charAt(0).toUpperCase() + g.slice(1)}</option>`).join('');
    }

    function extractCountries(data) {
        let countryCount = {};
        data.forEach(s => {
            if(s.country) {
                let c = s.country.trim();
                if(c) countryCount[c] = (countryCount[c] || 0) + 1;
            }
        });
        availableCountries = Object.keys(countryCount).sort();
        const filterEl = document.getElementById('country-filter');
        filterEl.innerHTML = '<option value="">All Countries</option>' + 
            availableCountries.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    }

    function hideLoader() {
        const loader = document.getElementById('loader');
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
    }

    /* --- SELF-GENERATED FAVICONS --- */
    function getFallbackIcon(name) {
        const cleanName = name ? String(name).trim().replace(/[^a-zA-Z0-9]/g, '') : '';
        const initials = cleanName.length > 0 ? cleanName.substring(0, 2).toUpperCase() : 'A0';
        const colors =['#FF2D55', '#5856D6', '#FF9500', '#34C759', '#0a84ff', '#AF52DE', '#FF3366'];
        let charCode = 0;
        for(let i=0; i<cleanName.length; i++) charCode += cleanName.charCodeAt(i);
        const bgColor = colors[charCode % colors.length];
        
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <rect width="100" height="100" fill="${bgColor}"/>
            <text x="50" y="50" font-family="sans-serif" font-size="44" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="central">${initials}</text>
        </svg>`;
        return `data:image/svg+xml,${encodeURIComponent(svg)}`;
    }

    /* --- 3D ENGINE --- */
    const canvas = document.getElementById('globeCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = isMobile ? 380 : 280;

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.05;
    controls.autoRotate = true; controls.autoRotateSpeed = 0.8;
    controls.enablePan = false; controls.minDistance = 120; controls.maxDistance = 600;

    const starGeo = new THREE.BufferGeometry();
    const starPos =[];
    for(let i=0; i<1500; i++) {
        const x = (Math.random() - 0.5) * 2000;
        const y = (Math.random() - 0.5) * 2000;
        const z = (Math.random() - 0.5) * 2000;
        if(Math.hypot(x, y, z) > 150) starPos.push(x, y, z);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 1.2, transparent: true, opacity: 0.6})));

    const earthRadius = 100;
    const earthMat = new THREE.MeshStandardMaterial({ color: 0x222b45, roughness: 0.8, metalness: 0.1 });
    const earth = new THREE.Mesh(new THREE.SphereGeometry(earthRadius, 64, 64), earthMat);
    scene.add(earth);

    const texLoader = new THREE.TextureLoader();
    texLoader.setCrossOrigin('Anonymous'); 

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight.position.set(5, 3, 5);
    scene.add(dirLight);

    function latLngToVector3(lat, lng, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(
            -(radius * Math.sin(phi) * Math.cos(theta)),
            radius * Math.cos(phi),
            radius * Math.sin(phi) * Math.sin(theta)
        );
    }

    function createCircleTexture() {
        const c = document.createElement('canvas'); c.width = 32; c.height = 32;
        const ctx = c.getContext('2d');
        ctx.beginPath(); ctx.arc(16, 16, 14, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
        return new THREE.CanvasTexture(c);
    }

    let pointsMesh;
    function addStationsToGlobe(data) {
        const positions = [];
        allStations = [];
        mappedStations =[];

        data.forEach(s => {
            allStations.push(s);
            if(s.geo_lat !== null && s.geo_long !== null) {
                const lat = parseFloat(s.geo_lat);
                const lng = parseFloat(s.geo_long); 
                if(!isNaN(lat) && !isNaN(lng)) {
                    const pos = latLngToVector3(lat, lng, earthRadius + 0.5);
                    s.position = pos;
                    positions.push(pos.x, pos.y, pos.z);
                    mappedStations.push(s);
                }
            }
        });

        if(positions.length > 0) {
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            pointsMesh = new THREE.Points(geometry, new THREE.PointsMaterial({
                size: 2.8, color: 0xffffff, map: createCircleTexture(), transparent: true, alphaTest: 0.1, sizeAttenuation: true, opacity: 0.8
            }));
            scene.add(pointsMesh);
        }
    }

    const activeBeacon = new THREE.Group(); activeBeacon.visible = false; scene.add(activeBeacon);
    activeBeacon.add(new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), new THREE.MeshBasicMaterial({ color: 0x0a84ff })));
    const ring = new THREE.Mesh(new THREE.RingGeometry(1.5, 3.5, 32), new THREE.MeshBasicMaterial({ color: 0x0a84ff, transparent: true, side: THREE.DoubleSide }));
    activeBeacon.add(ring);

    /* --- GLOBE INTERACTION --- */
    const raycaster = new THREE.Raycaster(); 
    raycaster.params.Points.threshold = isMobile ? 4.0 : 2.0; 
    const mouse = new THREE.Vector2();
    let isFlying = false; let targetCameraPos = new THREE.Vector3();
    const tooltip = document.getElementById('tooltip');

    function handleGlobeClick(clientX, clientY) {
        if (!pointsMesh || !earth) return;
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);

        const dotHits = raycaster.intersectObject(pointsMesh);
        if (dotHits.length > 0) {
            const station = mappedStations[dotHits[0].index];
            if (station) { startStationPlayback(station); return; }
        }

        const earthHit = raycaster.intersectObject(earth);
        if (earthHit.length > 0) {
            const hitPoint = earthHit[0].point;
            const nearbyStations = mappedStations
                .map(s => ({ station: s, dist: s.position.distanceTo(hitPoint) }))
                .filter(item => item.dist < 8) 
                .sort((a, b) => a.dist - b.dist)
                .map(item => item.station);

            if (nearbyStations.length > 0) startStationPlayback(nearbyStations[0]);
        }
    }

    window.addEventListener('mousemove', (e) => {
        if(isMobile || e.target.closest('#ui-layer') || !pointsMesh) return;
        
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        
        const intersects = raycaster.intersectObject(pointsMesh);
        if(intersects.length > 0) {
            const station = mappedStations[intersects[0].index];
            document.body.style.cursor = 'pointer';
            tooltip.style.left = e.clientX + 15 + 'px'; tooltip.style.top = e.clientY + 15 + 'px';
            tooltip.textContent = station.name;
            tooltip.style.display = 'block';
        } else {
            document.body.style.cursor = 'default';
            tooltip.style.display = 'none';
        }
    });

    let mouseDownPos = {x: 0, y: 0};
    canvas.addEventListener('pointerdown', e => mouseDownPos = {x: e.clientX, y: e.clientY});
    canvas.addEventListener('pointerup', e => {
        const dist = Math.hypot(e.clientX - mouseDownPos.x, e.clientY - mouseDownPos.y);
        if(dist < 10) handleGlobeClick(e.clientX, e.clientY);
    });

    controls.addEventListener('start', () => { controls.autoRotate = false; });

    function flyTo(position) {
        targetCameraPos.copy(position).normalize().multiplyScalar(180);
        isFlying = true; controls.autoRotate = false;
    }

    function animate() {
        requestAnimationFrame(animate);
        if(isFlying) {
            camera.position.lerp(targetCameraPos, 0.05); camera.lookAt(0,0,0);
            if(camera.position.distanceTo(targetCameraPos) < 2) {
                isFlying = false; controls.target.set(0,0,0); controls.update();
            }
        } else { controls.update(); }

        if(activeBeacon.visible) {
            const time = Date.now() * 0.004; const scale = 1 + Math.sin(time) * 0.5;
            ring.scale.set(scale, scale, 1); ring.material.opacity = Math.max(0, 0.5 - (scale - 1));
            ring.lookAt(camera.position);
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        isMobile = window.innerWidth <= 768;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* --- UI, LABELS & FILTER LOGIC --- */
    function renderSidebarList(list) {
        const container = document.getElementById('station-list');
        if(list.length === 0) { 
            container.innerHTML = `<div style="padding:15px; color:#888; text-align:center;">${currentMode === 'fav' ? 'No favorites saved.' : 'Nothing found.'}</div>`; 
            return; 
        }
        
        container.innerHTML = list.map(s => {
            const cleanObj = { ...s }; delete cleanObj.position;
            const fallbackStr = encodeURIComponent(JSON.stringify(cleanObj));
            
            const name = escapeHtml(s.name);
            const countryInfo =[s.countryCode || s.country, s.language].filter(Boolean).join(' • ');
            const geoText = escapeHtml(countryInfo || 'Global Stream');
            
            const tags = s.tags ? escapeHtml(s.tags.split(',').slice(0,3).join(', ')) : '';
            const tagHtml = tags ? `<div class="station-tags">${tags}</div>` : '';

            const iconSrc = s.favicon ? sanitizeUrl(s.favicon) : getFallbackIcon(s.name);

            return `
            <div class="station-item" id="item-${s.stationuuid}" onclick="selectFromList('${s.stationuuid}', '${fallbackStr}')">
                <img class="station-icon" src="${iconSrc}" onerror="this.onerror=null; this.src='${getFallbackIcon(s.name)}';">
                <div class="station-details">
                    <div class="station-name">${name}</div>
                    <div class="station-geo">${geoText}</div>
                    ${tagHtml}
                </div>
            </div>`;
        }).join('');
        
        if(currentStation) {
            const activeItem = document.getElementById(`item-${currentStation.stationuuid}`);
            if(activeItem) activeItem.classList.add('active');
        }
    }

    let searchTimeout;
    function applyFilters() {
        const query = document.getElementById('search-input').value.trim().toLowerCase();
        const genre = document.getElementById('genre-filter').value.toLowerCase();
        const country = document.getElementById('country-filter').value;
        
        let sourceList = currentMode === 'fav' ? favorites : allStations;

        if (currentMode === 'all' && query.length > 1) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                document.getElementById('station-list').innerHTML = `<div style="padding:15px; color:#888; text-align:center;">Searching live database...</div>`;
                try {
                    let url = `${apiBaseUrl}/stations/search?name=${encodeURIComponent(query)}&limit=100&order=votes&reverse=true`;
                    if (country) url += `&country=${encodeURIComponent(country)}`;
                    if (genre) url += `&tag=${encodeURIComponent(genre)}`;
                    
                    const res = await fetch(url);
                    let data = await res.json();
                    
                    normalizeTags(data);
                    
                    data.forEach(s => {
                        if(s.geo_lat !== null && s.geo_long !== null) {
                            const lat = parseFloat(s.geo_lat);
                            const lng = parseFloat(s.geo_long);
                            if(!isNaN(lat) && !isNaN(lng)) {
                                s.position = latLngToVector3(lat, lng, earthRadius + 0.5);
                            }
                        }
                    });
                    
                    currentFilteredList = data;
                    renderSidebarList(currentFilteredList);
                } catch(e) {
                    console.error("API search failed", e);
                }
            }, 400); 
            return;
        }
        
        let filtered = sourceList.filter(s => {
            const matchQuery = !query || (s.name && s.name.toLowerCase().includes(query)) || (s.country && s.country.toLowerCase().includes(query));
            const matchGenre = !genre || (s.normalizedTagsArray && s.normalizedTagsArray.includes(genre));
            const matchCountry = !country || s.country === country;
            return matchQuery && matchGenre && matchCountry;
        });

        currentFilteredList = filtered.slice(0, 500);
        renderSidebarList(currentFilteredList);
    }

    document.getElementById('tab-all').addEventListener('click', () => {
        currentMode = 'all';
        document.getElementById('tab-all').classList.add('active');
        document.getElementById('tab-fav').classList.remove('active');
        applyFilters();
    });

    document.getElementById('tab-fav').addEventListener('click', () => {
        currentMode = 'fav';
        document.getElementById('tab-fav').classList.add('active');
        document.getElementById('tab-all').classList.remove('active');
        applyFilters();
    });

    document.getElementById('search-input').addEventListener('input', applyFilters);
    document.getElementById('genre-filter').addEventListener('change', applyFilters);
    document.getElementById('country-filter').addEventListener('change', applyFilters);

    window.selectFromList = function(uuid, fallbackStr) {
        let station = currentFilteredList.find(s => s.stationuuid === uuid) || 
                      allStations.find(s => s.stationuuid === uuid) || 
                      favorites.find(s => s.stationuuid === uuid);
        if(!station && fallbackStr) station = JSON.parse(decodeURIComponent(fallbackStr));
        if(station) startStationPlayback(station);
    };

    function startStationPlayback(station) {
        currentStation = station;
        
        if(!station.position && station.geo_lat !== null && station.geo_long !== null) {
            station.position = latLngToVector3(parseFloat(station.geo_lat), parseFloat(station.geo_long), earthRadius + 0.5);
        }

        const playBtn = document.getElementById('play-btn');
        const iconImg = document.getElementById('player-mini-canvas');
        
        document.getElementById('player-title').textContent = station.name;
        document.getElementById('player-subtitle').textContent = "Connecting...";
        
        iconImg.src = station.favicon ? sanitizeUrl(station.favicon) : getFallbackIcon(station.name);
        iconImg.onerror = function() { this.onerror=null; this.src=getFallbackIcon(station.name); };

        const isFav = favorites.some(s => s.stationuuid === station.stationuuid);
        const favBtn = document.getElementById('fav-btn');
        if(isFav) favBtn.classList.add('active'); else favBtn.classList.remove('active');

        document.querySelectorAll('.station-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`item-${station.stationuuid}`);
        if(activeItem) {
            activeItem.classList.add('active');
            activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        if(station.position) {
            activeBeacon.position.copy(station.position);
            activeBeacon.visible = true; 
            flyTo(station.position);
        } else { activeBeacon.visible = false; }

        audio.src = station.url_resolved || station.url;
        audio.play().then(() => {
            playBtn.innerHTML = PAUSE_SVG;
            document.getElementById('player-subtitle').textContent = station.country || 'Live Stream';
            fetch(`${apiBaseUrl}/url/${station.stationuuid}`).catch(()=>{});
        }).catch(err => {
            console.warn("Playback failed.");
            playBtn.innerHTML = PLAY_SVG;
            document.getElementById('player-subtitle').textContent = '❌ Stream offline';
        });

        if(isMobile) sidebar.classList.add('collapsed');
    }

    document.getElementById('fav-btn').addEventListener('click', () => {
        if(!currentStation) return;
        const favBtnEl = document.getElementById('fav-btn');
        const idx = favorites.findIndex(s => s.stationuuid === currentStation.stationuuid);
        
        if(idx > -1) {
            favorites.splice(idx, 1);
            favBtnEl.classList.remove('active');
        } else {
            const favStation = { ...currentStation }; delete favStation.position;
            favorites.push(favStation);
            favBtnEl.classList.add('active');
        }
        
        localStorage.setItem('radioFavorites', JSON.stringify(favorites));
        if(currentMode === 'fav') applyFilters();
    });

    /* --- AUDIO VISUALIZER --- */
    let audioCtx, analyser, dataArray;
    const visContainer = document.getElementById('visualizer-container');
    const barCount = 48; const bars =[];

    for(let i=0; i<barCount; i++) {
        const bar = document.createElement('div');
        bar.className = 'vis-bar'; visContainer.appendChild(bar); bars.push(bar);
    }

    function initVisualizer() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser); analyser.connect(audioCtx.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        animateVisualizer();
    }

    function animateVisualizer() {
        requestAnimationFrame(animateVisualizer);
        if (!analyser) return;
        analyser.getByteFrequencyData(dataArray);
        for(let i=0; i<barCount; i++) {
            const val = dataArray[i % (dataArray.length / 2)];
            bars[i].style.height = `${Math.max(4, (val / 255) * 50)}px`;
            bars[i].style.opacity = 0.3 + (val / 255) * 0.7;
        }
    }

    audio.addEventListener('play', () => {
        initVisualizer();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    });

    function playNextStation() {
        if (!currentFilteredList.length) return;
        let index = 0;
        if (currentStation) {
            index = currentFilteredList.findIndex(s => s.stationuuid === currentStation.stationuuid);
            index = (index + 1) % currentFilteredList.length;
        }
        startStationPlayback(currentFilteredList[index]);
    }

    document.getElementById('next-btn').addEventListener('click', playNextStation);

    document.getElementById('play-btn').addEventListener('click', () => {
        if(!audio.src) return;
        if(audio.paused) { 
            audio.play(); 
            document.getElementById('play-btn').innerHTML = PAUSE_SVG; 
        } else { 
            audio.pause(); 
            document.getElementById('play-btn').innerHTML = PLAY_SVG; 
        }
    });

    document.getElementById('volume-slider').addEventListener('input', (e) => { audio.volume = e.target.value / 100; });
    
    /* --- SIDEBAR COLLAPSE LOGIC --- */
    const sidebar = document.getElementById('sidebar');
    let collapseTimer;

    function resetCollapseTimer() {
        clearTimeout(collapseTimer);
        if (isMobile) return; 
        collapseTimer = setTimeout(() => { sidebar.classList.add('collapsed'); }, 8000);
    }

    document.getElementById('sidebar-toggle').addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        if (!sidebar.classList.contains('collapsed')) resetCollapseTimer();
    });

    sidebar.addEventListener('mouseenter', () => clearTimeout(collapseTimer));
    sidebar.addEventListener('mouseleave', () => {
        if (!sidebar.classList.contains('collapsed')) resetCollapseTimer();
    });

    normalizeTags(favorites);
    initApp();
</script>
</body>
</html>
