<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Robert Rothe</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box;
        }
        .ui-group { color: #0f0; text-shadow: 0 0 5px #0f0; }
        #controls-info { text-align: right; font-size: 12px; opacity: 0.7; }
        #readouts { font-size: 18px; }
        #throttle-container {
            position: absolute; bottom: 50px; right: 50px; width: 20px; height: 200px;
            border: 2px solid #0f0; background: rgba(0, 50, 0, 0.5);
        }
        #throttle-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0%;
            background: #0f0; transition: height 0.1s; box-shadow: 0 0 10px #0f0;
        }
        #nav-ball {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 200px; text-align: center; color: #0f0;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="hud">
    <div class="ui-group" id="readouts">
        <div>VEL: <span id="vel">0</span> m/s</div>
        <div>ALT: <span id="alt">0</span> km</div>
        <div>APO: <span id="apo">0</span> km</div>
        <div>PER: <span id="per">0</span> km</div>
    </div>
    <div class="ui-group" id="controls-info">
        [W/S] Pitch &nbsp; [A/D] Yaw &nbsp; [Q/E] Roll<br>
        [SHIFT] Throttle Up &nbsp; [CTRL] Throttle Down<br>
        [Z] Max &nbsp; [X] Cut
    </div>
</div>

<div id="throttle-container">
    <div id="throttle-bar"></div>
</div>
<div id="nav-ball" class="ui-group">SAS: STABILITY ASSIST</div>

<!-- Load Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// --- CONFIGURATION ---
const G = 0.05; // Gravitational Constant (scaled for playability)
const PLANET_RADIUS = 200;
const PLANET_MASS = 500000; 
const ATMOSPHERE_HEIGHT = 30;

// --- SCENE SETUP ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 50000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lighting
const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
sunLight.position.set(1000, 500, 1000);
scene.add(sunLight);
const ambientLight = new THREE.AmbientLight(0x111111);
scene.add(ambientLight);

// Stars
const starGeo = new THREE.BufferGeometry();
const starCount = 5000;
const starPos = new Float32Array(starCount * 3);
for(let i=0; i<starCount*3; i++) {
    starPos[i] = (Math.random() - 0.5) * 10000;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 2, sizeAttenuation: false});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// --- PROCEDURAL PLANET (SHADERS) ---
// Vertex Shader
const vShader = `
    varying vec3 vNormal;
    varying vec3 vPosition;
    void main() {
        vNormal = normalize(normalMatrix * normal);
        vPosition = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
`;

// Fragment Shader (Earth-like procedural)
const fShader = `
    varying vec3 vNormal;
    varying vec3 vPosition;
    uniform vec3 lightDir;
    
    // Simple noise function
    float hash(vec3 p) {
        p  = fract( p*0.3183099+.1 );
        p *= 17.0;
        return fract( p.x*p.y*p.z*(p.x+p.y+p.z) );
    }

    float noise( in vec3 x ) {
        vec3 p = floor(x);
        vec3 f = fract(x);
        f = f*f*(3.0-2.0*f);
        return mix(mix(mix( hash(p+vec3(0,0,0)), hash(p+vec3(1,0,0)),f.x),
                       mix( hash(p+vec3(0,1,0)), hash(p+vec3(1,1,0)),f.x),f.y),
                   mix(mix( hash(p+vec3(0,0,1)), hash(p+vec3(1,0,1)),f.x),
                       mix( hash(p+vec3(0,1,1)), hash(p+vec3(1,1,1)),f.x),f.y),f.z);
    }

    void main() {
        vec3 sun = normalize(vec3(1000.0, 500.0, 1000.0));
        float intensity = max(dot(vNormal, sun), 0.05);
        
        // Procedural terrain
        float n = noise(normalize(vPosition) * 10.0);
        n += noise(normalize(vPosition) * 20.0) * 0.5;
        
        vec3 ocean = vec3(0.0, 0.1, 0.4);
        vec3 land = vec3(0.1, 0.4, 0.1);
        vec3 mountain = vec3(0.4, 0.3, 0.2);
        
        vec3 col = ocean;
        if(n > 0.9) col = land;
        if(n > 1.3) col = mountain;
        
        // Atmosphere rim (Fresnel)
        vec3 viewDir = normalize(cameraPosition - vPosition);
        float rim = 1.0 - max(dot(viewDir, vNormal), 0.0);
        rim = pow(rim, 4.0);
        
        vec3 finalColor = col * intensity + (vec3(0.2, 0.4, 1.0) * rim * 0.8);
        
        gl_FragColor = vec4(finalColor, 1.0);
    }
`;

const planetGeo = new THREE.SphereGeometry(PLANET_RADIUS, 128, 128);
const planetMat = new THREE.ShaderMaterial({
    vertexShader: vShader,
    fragmentShader: fShader,
    uniforms: {
        lightDir: { value: new THREE.Vector3(1, 0.5, 1) }
    }
});
const planet = new THREE.Mesh(planetGeo, planetMat);
scene.add(planet);

// Atmosphere Glow
const atmoGeo = new THREE.SphereGeometry(PLANET_RADIUS + ATMOSPHERE_HEIGHT, 64, 64);
const atmoMat = new THREE.ShaderMaterial({
    transparent: true,
    side: THREE.BackSide,
    vertexShader: `
        varying vec3 vNormal;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        void main() {
            float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 4.0);
            gl_FragColor = vec4(0.2, 0.6, 1.0, intensity * 0.8);
        }
    `
});
const atmosphere = new THREE.Mesh(atmoGeo, atmoMat);
scene.add(atmosphere);

// --- SHIP SETUP ---
const shipGroup = new THREE.Group();
const coneGeo = new THREE.ConeGeometry(1, 4, 8);
const coneMat = new THREE.MeshLambertMaterial({ color: 0xdddddd });
const shipMesh = new THREE.Mesh(coneGeo, coneMat);
shipMesh.rotation.x = Math.PI / 2; // Point forward
shipGroup.add(shipMesh);

// Engine Plume
const plumeGeo = new THREE.ConeGeometry(0.8, 3, 8);
const plumeMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0 });
const plume = new THREE.Mesh(plumeGeo, plumeMat);
plume.rotation.x = -Math.PI / 2;
plume.position.z = -2.5;
shipGroup.add(plume);

scene.add(shipGroup);

// Initialize State
// Start in Low Orbit
const startAlt = PLANET_RADIUS + 50;
shipGroup.position.set(0, startAlt, 0); 

// Calculate Orbital Velocity for Circular Orbit: v = sqrt(GM/r)
const vOrbit = Math.sqrt((G * PLANET_MASS) / startAlt);

const physics = {
    pos: new THREE.Vector3(0, startAlt, 0),
    vel: new THREE.Vector3(vOrbit, 0, 0), // Tangential velocity
    acc: new THREE.Vector3(),
    throttle: 0, // 0 to 1
    thrustPower: 30.0,
    mass: 1
};

// --- TRAJECTORY LINE (ORBIT PREDICTION) ---
const trajPoints = 1000;
const trajGeo = new THREE.BufferGeometry();
const trajPositions = new Float32Array(trajPoints * 3);
trajGeo.setAttribute('position', new THREE.BufferAttribute(trajPositions, 3));
const trajMat = new THREE.LineBasicMaterial({ color: 0x0088ff, opacity: 0.6, transparent: true });
const trajectoryLine = new THREE.Line(trajGeo, trajMat);
scene.add(trajectoryLine);

// --- CONTROLS ---
const keys = { w: false, a: false, s: false, d: false, q: false, e: false };
const ROT_SPEED = 0.03;

document.addEventListener('keydown', (e) => {
    switch(e.key.toLowerCase()) {
        case 'w': keys.w = true; break;
        case 's': keys.s = true; break;
        case 'a': keys.a = true; break;
        case 'd': keys.d = true; break;
        case 'q': keys.q = true; break;
        case 'e': keys.e = true; break;
        case 'shift': changeThrottle(0.02); break;
        case 'control': changeThrottle(-0.02); break;
        case 'z': physics.throttle = 1; break;
        case 'x': physics.throttle = 0; break;
    }
});
document.addEventListener('keyup', (e) => {
    switch(e.key.toLowerCase()) {
        case 'w': keys.w = false; break;
        case 's': keys.s = false; break;
        case 'a': keys.a = false; break;
        case 'd': keys.d = false; break;
        case 'q': keys.q = false; break;
        case 'e': keys.e = false; break;
    }
});

function changeThrottle(delta) {
    physics.throttle = Math.max(0, Math.min(1, physics.throttle + delta));
}

// --- SIMULATION LOOPS ---

// Propagator: Calculates future path for the blue line
function updateTrajectory() {
    let simPos = physics.pos.clone();
    let simVel = physics.vel.clone();
    let timeStep = 1; // Coarse step for prediction
    
    const positions = trajectoryLine.geometry.attributes.position.array;
    
    for (let i = 0; i < trajPoints; i++) {
        positions[i*3] = simPos.x;
        positions[i*3+1] = simPos.y;
        positions[i*3+2] = simPos.z;
        
        // Simplified Gravity
        let r = simPos.distanceTo(new THREE.Vector3(0,0,0));
        let rVec = simPos.clone().normalize().negate();
        let force = (G * PLANET_MASS) / (r * r);
        let gravity = rVec.multiplyScalar(force);
        
        simVel.add(gravity.multiplyScalar(timeStep));
        simPos.add(simVel.clone().multiplyScalar(timeStep));
        
        // Stop drawing if crashes
        if (r < PLANET_RADIUS) break;
    }
    trajectoryLine.geometry.attributes.position.needsUpdate = true;
}

// Main Loop
const clock = new THREE.Clock();
const dt = 1/60; // Fixed physics step

function animate() {
    requestAnimationFrame(animate);
    
    // 1. Handle Rotation Input
    if(keys.w) shipGroup.rotateX(-ROT_SPEED);
    if(keys.s) shipGroup.rotateX(ROT_SPEED);
    if(keys.a) shipGroup.rotateY(ROT_SPEED);
    if(keys.d) shipGroup.rotateY(-ROT_SPEED);
    if(keys.q) shipGroup.rotateZ(ROT_SPEED);
    if(keys.e) shipGroup.rotateZ(-ROT_SPEED);

    // 2. Physics Integration
    
    // Gravity
    let dist = physics.pos.distanceTo(new THREE.Vector3(0,0,0));
    let gravDir = physics.pos.clone().normalize().negate();
    let gravMag = (G * PLANET_MASS) / (dist * dist);
    let gravity = gravDir.multiplyScalar(gravMag);
    
    // Thrust
    let forward = new THREE.Vector3(0, 0, -1); // Ship points -Z locally
    forward.applyQuaternion(shipGroup.quaternion); // Get world direction
    let thrust = forward.multiplyScalar(physics.throttle * physics.thrustPower);
    
    // Atmosphere Drag (Simplified exponential)
    let altitude = dist - PLANET_RADIUS;
    let drag = new THREE.Vector3();
    if (altitude < ATMOSPHERE_HEIGHT) {
        let airDensity = Math.exp(-altitude / 10);
        let vSq = physics.vel.lengthSq();
        drag = physics.vel.clone().normalize().negate().multiplyScalar(0.05 * airDensity * vSq);
    }

    // Collision
    if (altitude <= 0) {
        physics.vel.set(0,0,0);
        physics.pos.setLength(PLANET_RADIUS);
        physics.throttle = 0;
        // Visual shake or reset could go here
    } else {
        // Apply Forces
        physics.acc.copy(gravity).add(thrust).add(drag); // a = F (mass is 1)
        physics.vel.add(physics.acc.clone().multiplyScalar(dt));
        physics.pos.add(physics.vel.clone().multiplyScalar(dt));
    }
    
    // Sync Visuals
    shipGroup.position.copy(physics.pos);
    
    // Engine Visuals
    plume.material.opacity = physics.throttle * (Math.random() * 0.5 + 0.5);
    plume.scale.setScalar(1 + Math.random() * 0.2);

    // 3. Camera Logic (Chase Cam)
    let relativeCameraOffset = new THREE.Vector3(0, 5, 15);
    let cameraOffset = relativeCameraOffset.applyMatrix4(shipGroup.matrixWorld);
    
    // Smooth camera
    camera.position.lerp(cameraOffset, 0.1);
    camera.lookAt(shipGroup.position);

    // 4. Update Trajectory Line
    updateTrajectory();

    // 5. UI Updates
    document.getElementById('vel').innerText = physics.vel.length().toFixed(1);
    document.getElementById('alt').innerText = (altitude).toFixed(1);
    document.getElementById('throttle-bar').style.height = (physics.throttle * 100) + '%';
    
    // Calculate Orbital Parameters (Apoapsis/Periapsis approximate)
    // This is a basic estimation based on Vis-Viva equation components
    let mu = G * PLANET_MASS;
    let v = physics.vel.length();
    let r = dist;
    let sma = 1 / (2/r - (v*v)/mu); // Semi-major axis
    // Note: Exact Pe/Ap requires eccentricity vector calc, simplifed here for display
    // Just showing current height vs projected SMA for "sim feel"
    document.getElementById('apo').innerText = (sma - PLANET_RADIUS).toFixed(0); 
    document.getElementById('per').innerText = "---"; // Complex to calc cheaply without Kepler elements

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
