<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robert rothe</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57);
            background-size: 400% 400%;
            animation: gradientShift 5s ease infinite;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .yo {
            font-size: 10vw;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px #ff6b6b, 0 0 60px #4ecdc4;
            animation: glow 2s ease-in-out infinite alternate, bounce 1s infinite;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px #ff6b6b, 0 0 60px #4ecdc4; }
            to { text-shadow: 0 0 30px rgba(255,255,255,1), 0 0 60px #45b7d1, 0 0 100px #96ceb4; }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleAnim 1s linear infinite;
        }
        @keyframes sparkleAnim {
            0% { opacity: 1; transform: scale(1) translateY(0); }
            50% { opacity: 0.5; transform: scale(1.5) translateY(-10px); }
            100% { opacity: 0; transform: scale(1) translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="yo" id="yoText">robert rothe</div>
    <script>
        const yo = document.getElementById('yoText');
        let sparkles = [];

        yo.addEventListener('click', function(e) {
            createSparkle(e.clientX, e.clientY);
            yo.textContent = yo.textContent === 'Yo!' ? 'Sup!' : 'Yo!';
            yo.style.fontSize = '12vw';
            setTimeout(() => { yo.style.fontSize = '10vw'; }, 200);
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            document.body.appendChild(sparkle);

            setTimeout(() => {
                sparkle.remove();
            }, 1000);
        }
        setInterval(() => {
            const rect = yo.getBoundingClientRect();
            const x = rect.left + Math.random() * rect.width;
            const y = rect.top + Math.random() * rect.height;
            createSparkle(x, y);
        }, 300);
    </script>
</body>
</html>
