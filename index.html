<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yo</title>
<style>
body { display:flex; height:100vh; margin:0; justify-content:center; align-items:center; background:#f0f0f0; font-family:sans-serif; }
#yoBtn { padding:1rem 2rem; font-size:2rem; cursor:pointer; background:#ffeb3b; border:none; border-radius:8px; transition:transform .2s; }
#yoBtn:active { transform:scale(0.95); }
</style>
</head>
<body>
<button id="yoBtn">Yo!</button>
<script>
const btn = document.getElementById('yoBtn');
btn.addEventListener('click', () => {
  btn.textContent = btn.textContent === 'Yo!' ? 'Yo yo!' : 'Yo!';
  const colors = ['#ffeb3b', '#ff9800', '#4caf50', '#2196f3', '#9c27b0'];
  document.body.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
});
</script>
</body>
</html>
